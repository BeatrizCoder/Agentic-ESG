name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ --ignore E501,F841,E702,E712,E701

      - name: Check imports
        run: |
          python3 -c "from src.cs.api.routes import router; print('routes OK')"
          python3 -c "from src.cs.db.mongo import save_analysis; print('mongo OK')"
          python3 -c "from src.cs.agents.definitions import climate_analyst_agent; print('agents OK')"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONGO_URL: ""
