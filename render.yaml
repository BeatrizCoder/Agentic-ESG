services:
  - type: web
    name: agentic-support-platform
    env: docker
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
