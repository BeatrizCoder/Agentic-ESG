    function formatStepDetails(details) {
      if (typeof details === 'string') return details;
      const entries = Object.entries(details || {});
      if (entries.length === 0) return 'No additional details.';
      return entries.map(([key, value]) => `<strong>${key}:</strong> ${sanitize(String(value))}`).join('<br>');
    }

    function sanitize(text) {
      return text.replace(/[&<>]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[tag]));
    }

    function truncate(text, limit) {
      return text.length > limit ? text.slice(0, limit - 1) + '…' : text;
    }

    function escapeHtml(text) {
      if (!text) return '';
      return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function attachMainEvents() {
      const submitButton = document.getElementById('submitRequest');
      if (submitButton) {
        submitButton.addEventListener('click', handleSubmitInquiry);
      }
      const newInquiry = document.getElementById('newInquiry');
      if (newInquiry) {
        newInquiry.addEventListener('click', () => {
          state.lastInquiry = '';
          state.feedbackStatus = null;
          state.showResult = false;
          state.feedbackDone = null;
          render();
        });
      }

      document.querySelectorAll('[data-feedback="true"]').forEach(button => {
        button.addEventListener('click', event => {
          const helpful = event.currentTarget.dataset.helpful === 'true';
          const ticket = state.tickets.find(t => !t._source);
          if (ticket) sendFeedback(ticket.reference_id, helpful);
          state.feedbackDone = helpful ? 'helpful' : 'not-helpful';
          render();
        });
      });

      ['customerName', 'customerEmail', 'customerPhone'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('input', e => { state[id] = e.target.value; });
      });

      const privacyCheckbox = document.getElementById('privacyCheckbox');
      if (privacyCheckbox) {
        privacyCheckbox.addEventListener('change', e => {
          state.privacyAccepted = e.target.checked;
          const btn = document.getElementById('submitRequest');
          if (btn) btn.disabled = !state.privacyAccepted || state.processing;
        });
      }

      document.querySelectorAll('[data-view-ticket]').forEach(button => {
        button.addEventListener('click', event => {
          state.activeTicketId = event.currentTarget.dataset.viewTicket;
          render();
        });
      });

      document.querySelectorAll('[data-tab]').forEach(button => {
        button.addEventListener('click', event => {
          state.activeTab = event.currentTarget.dataset.tab;
          render();
        });
      });

      document.querySelectorAll('[data-action]').forEach(button => {
        button.addEventListener('click', event => {
          const action = event.currentTarget.dataset.action;
          const id = event.currentTarget.dataset.id;
          const ticket = state.tickets.find(item => item.reference_id === id);
          if (!ticket) return;
          if (action === 'approve') {
            openModal('Confirm approval', 'Approve and resolve this escalated ticket?', 'Approve', () => approveTicket(ticket.reference_id));
          }
          if (action === 'reject') {
            openModal('Confirm rejection', 'Reject this escalated ticket and mark it for revision?', 'Reject', () => rejectTicket(ticket.reference_id));
          }
          if (action === 'await-customer') {
            openModal('Awaiting customer info', 'Put this ticket on hold until the customer provides more information?', 'Confirm', () => awaitCustomerInfo(ticket.reference_id));
          }
        });
      });

      document.querySelectorAll('[data-collapsible]').forEach(panel => {
        const header = panel.querySelector('.collapsible-header');
        if (!header) return;
        header.addEventListener('click', () => {
          panel.classList.toggle('open');
        });
      });

      document.querySelectorAll('[data-accordion]').forEach(panel => {
        const header = panel.querySelector('.collapsible-header');
        if (!header) return;
        header.addEventListener('click', () => {
          panel.classList.toggle('open');
        });
      });

      const filterStatus = document.getElementById('filterStatus');
      if (filterStatus) {
        filterStatus.addEventListener('change', event => {
          state.filters.status = event.target.value;
          render();
        });
      }

      const filterCategory = document.getElementById('filterCategory');
      if (filterCategory) {
        filterCategory.addEventListener('change', event => {
          state.filters.category = event.target.value;
          render();
        });
      }
    }

    function handleSubmitInquiry() {
      if (!state.privacyAccepted) {
        showToast('Aceite a Política de Privacidade para continuar.');
        return;
      }
      if (!state.customerName.trim()) {
        showToast('Por favor informe seu nome completo.');
        return;
      }
      if (!state.customerEmail.trim()) {
        showToast('Por favor informe seu e-mail.');
        return;
      }
      const inquiry = document.getElementById('inquiryInput').value.trim();
      if (!inquiry) {
        showToast('Por favor descreva seu problema antes de enviar.');
        return;
      }
      if (state.processing) return;
      state.processing = true;
      state.showResult = false;
      state.feedbackDone = null;
      state.progressState = AGENTS.map(agent => ({ ...agent, status: 'waiting' }));
      state.feedbackStatus = null;
      render();
      state.lastInquiry = inquiry;
      const startTime = Date.now();
      const progressPromise = simulateProgress();
      callSupportApi(inquiry).then(ticket => {
        _animGeneration++;                   // cancel any pending simulateProgress timeouts
        ticket.elapsed = formatElapsed(startTime, new Date());
        ticket.customerName = state.customerName.trim();
        ticket.customerEmail = state.customerEmail.trim();
        ticket.customerPhone = state.customerPhone.trim();
        state.tickets.unshift(ticket);
        state.activeTicketId = ticket.reference_id;
        state.processing = false;
        state.showResult = true;
        render();
        showToast('✅ Sua solicitação foi processada com sucesso!');
        loadMetrics();
      }).catch(() => {
        _animGeneration++;
        state.processing = false;
        showToast('Não foi possível processar o pedido. Verifique o backend ou use o modo offline.');
        render();
      });
    }

    let _animGeneration = 0;

    function simulateProgress() {
      const generation = ++_animGeneration;
      return new Promise(resolve => {
        let current = 0;
        function nextStep() {
          if (generation !== _animGeneration || !state.processing) { resolve(); return; }
          if (current > 0) {
            state.progressState[current - 1].status = 'done';
          }
          if (current === AGENTS.length) {
            resolve();
            return;
          }
          state.progressState[current].status = 'active';
          render();
          setTimeout(() => {
            current += 1;
            nextStep();
          }, 850);
        }
        nextStep();
      });
    }

    function callSupportApi(inquiry) {
      return new Promise(async resolve => {
        if (!state.useBackend) {
          return resolve(generateOfflineTicket(inquiry));
        }
        try {
          const response = await fetch(state.backendUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ inquiry }),
          });
          if (!response.ok) {
            throw new Error('backend error');
          }
          const data = await response.json();
          const ticket = normalizeTicket(data, false);
          resolve(ticket);
        } catch (error) {
          showToast('Backend indisponível. Alternando para modo offline.');
          resolve(generateOfflineTicket(inquiry));
        }
      });
    }

    function normalizeTicket(data, offline) {
      const timestamp = new Date();
      return {
        inquiry: data.inquiry || state.lastInquiry || '',
        category: data.category || 'General Support',
        category_confidence: Number(data.category_confidence || 0),
        sentiment: data.sentiment || 'Neutral',
        sentiment_confidence: Number(data.sentiment_confidence || 0),
        urgency: data.urgency || 'Low',
        articles: Array.isArray(data.articles) ? data.articles : [],
        response: data.response || 'The AI agent generated a response successfully.',
        response_confidence: Number(data.response_confidence || 0),
        escalation_required: !!data.escalation_required,
        escalation_reason: data.escalation_reason || '',
        reference_id: data.reference_id || generateReferenceId(),
        triggered_keyword: data.triggered_keyword || null,
        steps: Array.isArray(data.steps) ? data.steps : [],
        execution_mode: data.execution_mode || 'backend',
        tools_used: Array.isArray(data.tools_used) ? data.tools_used : [],
        offline,
        timestamp: formatTimestamp(timestamp),
        timestampRaw: timestamp.toISOString(),
      };
    }

    function generateReferenceId() {
      return 'ESC-' + Math.random().toString(36).slice(2, 8).toUpperCase() + '-' + Date.now().toString().slice(-5);
    }

    function generateOfflineTicket(inquiry) {
      const reference_id = generateReferenceId();
      const normalizedInquiry = inquiry.toLowerCase();
      const categories = {
        'Order Issues': ['order', 'delivery', 'package', 'shipment', 'tracking'],
        Billing: ['charge', 'payment', 'invoice', 'bill', 'refund', 'money'],
        'Account Access': ['password', 'login', 'access', 'account', 'locked', 'reset'],
        'Technical Issue': ['error', 'bug', 'crash', 'slow', 'broken', 'issue'],
      };
      let category = 'General Support';
      for (const [name, list] of Object.entries(categories)) {
        if (list.some(term => normalizedInquiry.includes(term))) {
          category = name;
          break;
        }
      }
      const urgentTerms = ['urgent', 'asap', 'immediately', 'emergency', 'critical'];
      const concernTerms = ['frustrated', 'angry', 'disappointed', 'upset', 'problem', 'issue'];
      let urgency = 'Low';
      let sentiment = 'Neutral';
      if (urgentTerms.some(term => normalizedInquiry.includes(term))) {
        urgency = 'High';
        sentiment = 'Urgent';
      } else if (concernTerms.some(term => normalizedInquiry.includes(term))) {
        urgency = 'Medium';
        sentiment = 'Concerned';
      }
      const escalation_required = urgency === 'High' || normalizedInquiry.includes('refund') || normalizedInquiry.includes('manager') || normalizedInquiry.includes('escalate');
      const response = escalation_required
        ? `Obrigado por relatar este problema. Nossa equipe especializada irá revisar sua solicitação imediatamente e retornará em até 24 horas.`
        : `Recebemos sua solicitação e nossa equipe de agentes está trabalhando para responder com precisão. Em breve teremos um retorno baseado nas informações fornecidas.`;
      const articles = {
        'Order Issues': ['Tracking Your Package', 'Delivery Delays and Solutions'],
        Billing: ['Understanding Your Invoice', 'Refund and Charge Disputes'],
        'Account Access': ['Resetting Your Password', 'Account Recovery Steps'],
        'Technical Issue': ['Troubleshooting Common Errors', 'Improve App Performance'],
        'General Support': ['Customer Support Best Practices', 'How to Get Faster Help'],
      }[category] || ['Customer support policies'];
      const triggered_keyword = ['refund', 'escalate', 'manager'].find(term => normalizedInquiry.includes(term)) || null;
      const steps = [
        { agent: 'Classifier Agent', details: { tool_used: 'Keyword matcher', category, confidence: 0.76 } },
        { agent: 'Sentiment Agent', details: { sentiment, urgency, confidence: 0.72 } },
        { agent: 'Knowledge Agent', details: { articles_found: articles.length, source: 'Local knowledge pack' } },
        { agent: 'Response Generation Agent', details: { output: response, confidence: 0.68 } },
        { agent: 'Escalation Agent', details: { escalation: escalation_required, reason: escalation_required ? 'High urgency or refund request' : 'Confidence acceptable' } },
      ];
      return {
        inquiry,
        category,
        category_confidence: 0.75,
        sentiment,
        sentiment_confidence: 0.72,
        urgency,
        articles,
        response,
        response_confidence: 0.66,
        escalation_required,
        escalation_reason: escalation_required ? 'Detected urgent or refund terms.' : '',
        reference_id,
        triggered_keyword,
        steps,
        execution_mode: 'offline',
        tools_used: ['Classifier Tool', 'Sentiment Tool', 'Knowledge Tool', 'Response Tool', 'Escalation Tool'],
        offline: true,
        timestamp: formatTimestamp(new Date()),
        timestampRaw: new Date().toISOString(),
      };
    }

    function formatTimestamp(date) {
      return date.toLocaleString('pt-BR', { hour12: false });
    }

    function formatElapsed(start, end) {
      const diff = Math.max(0, new Date(end) - new Date(start));
      const seconds = Math.round(diff / 1000);
      return `${seconds}s`;
    }

    function sendFeedback(referenceId, helpful) {
      const ticket = state.tickets.find(item => item.reference_id === referenceId);
      if (!ticket) return;
      if (!state.useBackend) {
        state.feedbackStatus = helpful ? 'Feedback registrado localmente.' : 'Feedback negativo registrado localmente.';
        render();
        return;
      }
      fetch(`${state.backendUrl}/${referenceId}/feedback`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ helpful }),
      }).then(response => {
        if (response.ok) {
          state.feedbackStatus = helpful ? 'Feedback enviado com sucesso.' : 'Feedback negativo enviado.';
        } else {
          state.feedbackStatus = 'Não foi possível enviar feedback para o backend.';
        }
        render();
      }).catch(() => {
        state.feedbackStatus = 'Falha no envio do feedback. Verifique a conexão.';
        render();
      });
    }

    function openModal(title, message, confirmLabel, onConfirm) {
      state.modal = { title, message, confirmLabel, onConfirm };
      renderModal();
    }

    function closeModal() {
      state.modal = null;
      renderModal();
    }

    function renderModal() {
      const modalRoot = document.getElementById('modal');
      if (!state.modal) {
        modalRoot.className = '';
        modalRoot.innerHTML = '';
        modalRoot.setAttribute('aria-hidden', 'true');
        return;
      }
      modalRoot.className = 'open';
      modalRoot.setAttribute('aria-hidden', 'false');
      modalRoot.innerHTML = `
        <div class="modal-card" role="dialog" aria-modal="true">
          <div class="modal-header">
            <div><h3>${state.modal.title}</h3><p style="color: var(--muted); margin: 4px 0 0; font-size: 0.95rem;">${state.modal.message}</p></div>
            <button class="modal-close" aria-label="Close modal">✕</button>
          </div>
          <div class="modal-buttons">
            <button class="button-primary" id="modalConfirm">${state.modal.confirmLabel}</button>
            <button class="button-secondary" id="modalCancel">Cancelar</button>
          </div>
        </div>
      `;
      document.getElementById('modalConfirm').addEventListener('click', () => {
        state.modal.onConfirm();
        closeModal();
      });
      document.getElementById('modalCancel').addEventListener('click', closeModal);
      modalRoot.addEventListener('click', event => {
        if (event.target === modalRoot) closeModal();
      });
    }

    function approveTicket(referenceId) {
      const ticket = state.tickets.find(t => t.reference_id === referenceId);
      if (!ticket) return;
      if (!state.useBackend) {
        ticket.escalation_required = false;
        state.feedbackStatus = 'Ticket aprovado localmente.';
        render();
        return;
      }
      fetch(`${state.backendUrl}/${referenceId}/approve`, { method: 'POST', headers: { 'X-API-Key': state.apiKey } })
        .then(response => {
          if (response.ok) {
            ticket.escalation_required = false;
            state.feedbackStatus = 'Ticket aprovado e resolvido.';
          } else {
            state.feedbackStatus = 'Falha ao aprovar ticket no backend.';
          }
          render();
        }).catch(() => {
          state.feedbackStatus = 'Erro de conexão ao aprovar ticket.';
          render();
        });
    }

    function rejectTicket(referenceId) {
      const ticket = state.tickets.find(t => t.reference_id === referenceId);
      if (!ticket) return;
      if (!state.useBackend) {
        ticket.escalation_required = true;
        state.feedbackStatus = 'Ticket marcado como rejeitado localmente.';
        render();
        return;
      }
      fetch(`${state.backendUrl}/${referenceId}/reject`, { method: 'POST', headers: { 'X-API-Key': state.apiKey } })
        .then(response => {
          if (response.ok) {
            ticket.escalation_required = true;
            state.feedbackStatus = 'Ticket rejeitado e retornado para revisão.';
          } else {
            state.feedbackStatus = 'Falha ao rejeitar ticket no backend.';
          }
          render();
        }).catch(() => {
          state.feedbackStatus = 'Erro de conexão ao rejeitar ticket.';
          render();
        });
    }

    function awaitCustomerInfo(referenceId) {
      const ticket = state.tickets.find(t => t.reference_id === referenceId);
      if (!ticket) return;
      if (!state.useBackend) {
        ticket.status = 'awaiting_customer_info';
        state.feedbackStatus = 'Ticket marcado como aguardando resposta do cliente.';
        render();
        return;
      }
      fetch(`${state.backendUrl}/${referenceId}/await-customer`, { method: 'POST', headers: { 'X-API-Key': state.apiKey } })
        .then(response => {
          if (response.ok) {
            ticket.status = 'awaiting_customer_info';
            state.feedbackStatus = 'Ticket marcado como aguardando resposta do cliente.';
          } else {
            state.feedbackStatus = 'Falha ao atualizar status do ticket.';
          }
          render();
        }).catch(() => {
          state.feedbackStatus = 'Erro de conexão ao atualizar ticket.';
          render();
        });
    }

    // ─────────────────────────────────────────────
    // ANALYTICS VIEW
    // ─────────────────────────────────────────────

    function renderAnalyticsView() {
      const tickets = state.tickets;
      if (tickets.length === 0) {
        return `
          <section class="page-header">
            <div>
              <div class="hero-badge">Analytics</div>
              <h1 class="hero-title" style="font-size: clamp(2rem, 3vw, 2.8rem); margin-top: 12px;">Analytics</h1>
              <p class="hero-copy">Insights sobre tickets processados.</p>
            </div>
          </section>
          <div class="empty-state" style="padding: 80px 36px;">
            <div style="font-size: 2.4rem; margin-bottom: 16px;">📊</div>
            <h3>No data yet</h3>
            <p>Process tickets in the Customer Portal to see analytics here.</p>
          </div>
        `;
      }
      return `
        <section class="page-header">
          <div>
            <div class="hero-badge">Analytics</div>
            <h1 class="hero-title" style="font-size: clamp(2rem, 3vw, 2.8rem); margin-top: 12px;">Analytics</h1>
            <p class="hero-copy">Insights from ${tickets.length} processed ticket${tickets.length !== 1 ? 's' : ''}.</p>
          </div>
        </section>

        ${renderAnalyticsKPIs(tickets)}

        <div style="display:flex;align-items:center;gap:14px;margin-top:32px;margin-bottom:4px;">
          <div style="flex:1;height:1px;background:rgba(255,255,255,0.08);"></div>
          <span style="font-size:0.72rem;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:0.16em;text-transform:uppercase;white-space:nowrap;">Customer Metrics</span>
          <div style="flex:1;height:1px;background:rgba(255,255,255,0.08);"></div>
        </div>
        ${renderAnalyticsCSAT()}
        ${renderAnalyticsCategoryChart(tickets)}
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
          ${renderAnalyticsSentimentChart(tickets)}
          ${renderAnalyticsUrgencyPills(tickets)}
        </div>
        ${renderAnalyticsTimeline(tickets)}

        <div style="display:flex;align-items:center;gap:14px;margin-top:36px;margin-bottom:6px;">
          <div style="flex:1;height:1px;background:rgba(255,255,255,0.08);"></div>
          <span style="font-size:0.72rem;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:0.16em;text-transform:uppercase;white-space:nowrap;">System Metrics</span>
          <div style="flex:1;height:1px;background:rgba(255,255,255,0.08);"></div>
        </div>
        <p style="margin:0 0 4px;font-size:0.78rem;color:var(--muted);opacity:0.65;">Technical performance data for engineering teams</p>

        ${renderAgentHealth(tickets)}
        <div style="height: 40px;"></div>
      `;
    }

    function renderAnalyticsKPIs(tickets) {
      const total = tickets.length;
      const escalated = tickets.filter(t => t.escalation_required).length;
      const resolved = total - escalated;
      const escalationRate = total > 0 ? ((escalated / total) * 100).toFixed(1) : '0.0';
      const resolutionRate = total > 0 ? ((resolved / total) * 100).toFixed(1) : '0.0';
      function _parseWall(t) {
        const v = t.wall_time_sec != null ? t.wall_time_sec
          : t._elapsed != null ? t._elapsed : t.elapsed != null ? t.elapsed : t.wall_time;
        if (v == null) return null;
        if (typeof v === 'number') return v > 0 ? v : null;
        const n = parseFloat(v); return isNaN(n) || n <= 0 ? null : n;
      }
      const times = tickets.map(_parseWall).filter(v => v !== null);
      const avgTime = times.length > 0
        ? (times.reduce((a, b) => a + b, 0) / times.length).toFixed(1)
        : '—';
      return `
        <section class="metrics-row">
          ${renderMetricCard(total, 'Total Tickets')}
          ${renderMetricCard(escalationRate + '%', 'Escalation Rate')}
          ${renderMetricCard(avgTime !== '—' ? avgTime + 's' : '—', 'Avg Response Time')}
          ${renderMetricCard(resolutionRate + '%', 'Resolution Rate')}
        </section>
      `;
    }

    function renderAnalyticsCSAT() {
      const c = state.csatMetrics;
      const noData = !c || c.total_feedback === 0;

      if (noData) {
        return `
          <div class="panel-card" style="margin-top: 20px; padding: 28px 32px;">
            <h3 style="margin: 0 0 20px; font-size: 0.88rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em;">Customer Satisfaction (CSAT)</h3>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">
              ${['CSAT Score', 'Feedback Received', 'Response Rate'].map(label => `
                <div style="background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:24px 18px; text-align:center;">
                  <div style="font-size:1.5rem; font-family:'DM Mono',monospace; color:var(--muted); margin-bottom:10px;">—</div>
                  <div style="font-size:0.85rem; color:var(--muted); margin-bottom:6px;">${label}</div>
                  <div style="font-size:0.75rem; color:var(--muted); opacity:0.6;">No feedback yet</div>
                </div>
              `).join('')}
            </div>
            <p style="margin: 16px 0 0; font-size:0.78rem; color:var(--muted); opacity:0.7; font-family:'DM Mono',monospace;">Submit tickets and rate responses to see CSAT data.</p>
          </div>
        `;
      }

      const score = c.csat_score;
      const scoreColor = score >= 75 ? '#6EE7B7' : score >= 60 ? '#FBBF24' : '#F87171';
      const scoreEmoji = score >= 80 ? '😊' : score >= 75 ? '🙂' : score >= 60 ? '😐' : score >= 40 ? '😟' : '😞';
      const scorePillLabel = score >= 80 ? '🟢 Exceeds Benchmark' : score >= 75 ? '🟢 Meets Benchmark' : score >= 60 ? '🟡 Below Benchmark' : score >= 40 ? '🔴 Needs Attention' : '🔴 Critical';
      const scorePillColor = score >= 75 ? '#6EE7B7' : score >= 60 ? '#FBBF24' : '#F87171';
      const scorePillBg   = score >= 75 ? 'rgba(110,231,183,0.12)' : score >= 60 ? 'rgba(251,191,36,0.12)' : 'rgba(248,113,113,0.12)';
      const helpfulPct = c.total_feedback > 0 ? Math.round((c.helpful_count / c.total_feedback) * 100) : 0;
      const notHelpfulPct = c.total_feedback > 0 ? Math.round((c.not_helpful_count / c.total_feedback) * 100) : 0;

      return `
        <div class="panel-card" style="margin-top: 20px; padding: 28px 32px;">
          <h3 style="margin: 0 0 20px; font-size: 0.88rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em;">Customer Satisfaction (CSAT)</h3>
          <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">

            <!-- Card 1: CSAT Score -->
            <div style="background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:24px 18px; text-align:center;">
              <div style="font-size:2.4rem; margin-bottom:4px;">${scoreEmoji}</div>
              <div style="font-size:2.2rem; font-family:'DM Mono',monospace; color:${scoreColor}; line-height:1; margin-bottom:8px;">${score}%</div>
              <div style="font-size:0.88rem; color:var(--text); font-weight:500; margin-bottom:4px;">CSAT Score</div>
              <div style="font-size:0.75rem; color:var(--muted); opacity:0.75; margin-bottom:10px;">Based on customer feedback</div>
              <span style="font-size:0.67rem; font-family:'DM Mono',monospace; background:${scorePillBg}; color:${scorePillColor}; border:1px solid ${scorePillColor}; border-radius:20px; padding:3px 10px;">${scorePillLabel}</span>
            </div>

            <!-- Card 2: Feedback breakdown -->
            <div style="background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:24px 18px;">
              <div style="font-size:0.88rem; color:var(--text); font-weight:500; margin-bottom:16px;">Feedback Received</div>
              <div style="display:grid; gap:12px;">
                <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
                  <span style="font-size:0.9rem;">👍 Helpful</span>
                  <span style="font-family:'DM Mono',monospace; font-size:0.85rem; color:#6EE7B7;">${c.helpful_count} <span style="color:var(--muted); font-size:0.78rem;">(${helpfulPct}%)</span></span>
                </div>
                <div style="background:rgba(255,255,255,0.06); border-radius:4px; height:4px; overflow:hidden;">
                  <div style="height:100%; width:${helpfulPct}%; background:#6EE7B7; border-radius:4px; transition:width 0.4s;"></div>
                </div>
                <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
                  <span style="font-size:0.9rem;">👎 Not Helpful</span>
                  <span style="font-family:'DM Mono',monospace; font-size:0.85rem; color:#F87171;">${c.not_helpful_count} <span style="color:var(--muted); font-size:0.78rem;">(${notHelpfulPct}%)</span></span>
                </div>
                <div style="background:rgba(255,255,255,0.06); border-radius:4px; height:4px; overflow:hidden;">
                  <div style="height:100%; width:${notHelpfulPct}%; background:#F87171; border-radius:4px; transition:width 0.4s;"></div>
                </div>
              </div>
            </div>

            <!-- Card 3: Feedback Rate -->
            <div style="background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:24px 18px; text-align:center;">
              <div style="font-size:2.2rem; font-family:'DM Mono',monospace; color:var(--accent2); line-height:1; margin-bottom:8px;">${c.feedback_rate}%</div>
              <div style="font-size:0.88rem; color:var(--text); font-weight:500; margin-bottom:4px;">Response Rate</div>
              <div style="font-size:0.75rem; color:var(--muted); opacity:0.75; margin-bottom:10px;">Customers who left feedback</div>
              <div style="font-size:0.72rem; font-family:'DM Mono',monospace; color:var(--muted); background:rgba(255,255,255,0.04); border-radius:6px; padding:5px 8px; opacity:0.8;">Industry benchmark: 15–25%</div>
            </div>

          </div>
        </div>
      `;
    }

    function renderAgentHealth(tickets) {
      const total = tickets.length;

      // ── Row 1: Quality ────────────────────────────────────────────────────
      const catConfs = tickets.map(t => Number(t.category_confidence || 0)).filter(v => v > 0);
      const classAcc = catConfs.length > 0
        ? Math.round(catConfs.reduce((a, b) => a + b, 0) / catConfs.length)
        : 0;
      const classStatus = classAcc >= 80 ? 'green' : classAcc >= 60 ? 'yellow' : 'red';
      const classPill = classStatus === 'green' ? '🟢 On Target' : classStatus === 'yellow' ? '🟡 Needs Review' : '🔴 Action Required';

      function parseTime(t) {
        const v = t.wall_time_sec != null ? t.wall_time_sec
          : t._elapsed != null ? t._elapsed : t.elapsed != null ? t.elapsed : t.wall_time;
        if (v == null) return null;
        if (typeof v === 'number') return v > 0 ? v : null;
        const n = parseFloat(v);
        return isNaN(n) || n <= 0 ? null : n;
      }
      const times = tickets.map(parseTime).filter(v => v !== null);
      const avgTime = times.length > 0 ? times.reduce((a, b) => a + b, 0) / times.length : null;
      const timeStatus = avgTime === null ? 'gray' : avgTime < 15 ? 'green' : avgTime <= 30 ? 'yellow' : 'red';
      const timePill = timeStatus === 'green' ? '🟢 Fast' : timeStatus === 'yellow' ? '🟡 Moderate' : timeStatus === 'red' ? '🔴 Slow' : '⚪ No Data';

      const confArr = tickets.map(t => Number(t.response_confidence || 0)).filter(v => v > 0);
      const avgConf = confArr.length > 0 ? Math.round(confArr.reduce((a, b) => a + b, 0) / confArr.length) : 0;
      const confStatus = avgConf >= 70 ? 'green' : avgConf >= 50 ? 'yellow' : 'red';
      const confPill = confStatus === 'green' ? '🟢 High' : confStatus === 'yellow' ? '🟡 Moderate' : '🔴 Low';

      // ── Row 2: Operational ────────────────────────────────────────────────
      // Cost per ticket — use real API cost when available, else estimate
      const llmWithCost = tickets.filter(t => t.execution_mode === 'llm' && t.cost_usd > 0);
      const avgCostUsd = llmWithCost.length > 0
        ? llmWithCost.reduce((s, t) => s + t.cost_usd, 0) / llmWithCost.length
        : 750 * 0.000001;
      const costLabel = llmWithCost.length > 0 ? 'Based on real API usage' : 'Estimated (750 tokens avg)';

      const escalatedCount = tickets.filter(t => t.escalation_required).length;
      const escalPct = total > 0 ? Math.round((escalatedCount / total) * 100) : 0;
      const escalStatus = escalPct < 30 ? 'green' : escalPct <= 50 ? 'yellow' : 'red';
      const escalPill = escalStatus === 'green' ? '🟢 Healthy' : escalStatus === 'yellow' ? '🟡 Elevated' : '🔴 High';

      const resolvedCount = tickets.filter(t => !t.escalation_required || t.status === 'approved' || t.status === 'resolved').length;
      const resPct = total > 0 ? Math.round((resolvedCount / total) * 100) : 0;
      const resStatus = resPct >= 60 ? 'green' : resPct >= 40 ? 'yellow' : 'red';
      const resPill = resStatus === 'green' ? '🟢 Healthy' : resStatus === 'yellow' ? '🟡 Moderate' : '🔴 Low';

      // ── Row 3: Pipeline ───────────────────────────────────────────────────
      const withArticles = tickets.filter(t => Array.isArray(t.articles) && t.articles.length > 0).length;
      const kbPct = total > 0 ? Math.round((withArticles / total) * 100) : 0;
      const kbStatus = kbPct >= 80 ? 'green' : kbPct >= 50 ? 'yellow' : 'red';
      const kbPill = kbStatus === 'green' ? '🟢 Good Coverage' : kbStatus === 'yellow' ? '🟡 Partial' : '🔴 Low Coverage';

      const detCount = tickets.filter(t => t.execution_mode === 'deterministic').length;
      const llmCount = tickets.length - detCount;
      const fallbackPct = total > 0 ? Math.round((detCount / total) * 100) : 0;
      const fallbackStatus = fallbackPct < 20 ? 'green' : fallbackPct <= 50 ? 'yellow' : 'red';
      const fallbackPill = fallbackStatus === 'green' ? '🟢 LLM Active' : fallbackStatus === 'yellow' ? '🟡 Mixed Mode' : '🔴 High Fallback';

      const now = Date.now();
      const tickets24h = tickets.filter(t => {
        const ts = t.created_at || t.timestampRaw;
        return ts && new Date(ts).getTime() >= now - 86400000;
      }).length;
      const avgPerHour = (tickets24h / 24).toFixed(1);

      // ── Banner ────────────────────────────────────────────────────────────
      const redCount = [classStatus, timeStatus, confStatus, escalStatus, resStatus, kbStatus, fallbackStatus].filter(s => s === 'red').length;
      let bannerBorderColor, bannerBg, bannerIcon, bannerText;
      if (redCount === 0) {
        bannerBorderColor = '#6EE7B7'; bannerBg = 'rgba(110,231,183,0.07)'; bannerIcon = '🟢';
        bannerText = 'All Systems Healthy — AI pipeline operating normally';
      } else if (redCount === 1) {
        bannerBorderColor = '#FBBF24'; bannerBg = 'rgba(251,191,36,0.07)'; bannerIcon = '🟡';
        bannerText = 'Action Recommended — 1 metric needs attention';
      } else {
        bannerBorderColor = '#F87171'; bannerBg = 'rgba(248,113,113,0.07)'; bannerIcon = '🔴';
        bannerText = `Attention Required — ${redCount} metrics need review`;
      }

      // ── Style helpers ─────────────────────────────────────────────────────
      const CYAN    = '#38BDF8';
      const VIOLET  = '#A78BFA';
      const EMERALD = '#6EE7B7';
      const SC = {
        green:  { text: '#6EE7B7', pillBg: 'rgba(110,231,183,0.12)', pillBorder: '#6EE7B7'  },
        yellow: { text: '#FBBF24', pillBg: 'rgba(251,191,36,0.12)',  pillBorder: '#FBBF24'  },
        red:    { text: '#F87171', pillBg: 'rgba(248,113,113,0.12)', pillBorder: '#F87171'  },
        gray:   { text: '#64748B', pillBg: 'rgba(255,255,255,0.06)', pillBorder: 'rgba(255,255,255,0.18)' },
      };

      function pill(status, label) {
        const c = SC[status] || SC.gray;
        return `<span style="font-size:0.67rem;font-family:'DM Mono',monospace;background:${c.pillBg};color:${c.text};border:1px solid ${c.pillBorder};border-radius:20px;padding:3px 9px;white-space:nowrap;">${label}</span>`;
      }

      function card(rowColor, status, icon, title, value, desc, subNote, pillLabel, delay) {
        const c = SC[status] || SC.gray;
        return `
          <div style="background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.08);border-left:3px solid ${rowColor};border-radius:14px;padding:20px 18px 16px;display:flex;flex-direction:column;gap:10px;animation:ahFadeUp 0.38s ease both;animation-delay:${delay}ms;">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap;">
              <div style="display:flex;align-items:center;gap:7px;">
                <span style="font-size:1.05rem;">${icon}</span>
                <span style="font-size:0.75rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;">${title}</span>
              </div>
              ${pill(status, pillLabel)}
            </div>
            <div style="font-size:2.4rem;font-family:'DM Mono',monospace;color:${c.text};line-height:1;letter-spacing:-0.02em;">${value}</div>
            ${subNote ? `<div style="font-size:0.74rem;color:var(--muted);font-family:'DM Mono',monospace;opacity:0.85;">${subNote}</div>` : ''}
            <div style="font-size:0.74rem;color:var(--muted);opacity:0.6;margin-top:auto;line-height:1.4;">${desc}</div>
          </div>`;
      }

      function rowHeader(color, label, subtitle) {
        return `
          <div style="display:flex;align-items:center;gap:10px;margin-top:24px;margin-bottom:${subtitle ? '6px' : '14px'};">
            <div style="flex:1;height:1px;background:${color};opacity:0.22;"></div>
            <span style="font-size:0.67rem;color:${color};font-family:'DM Mono',monospace;letter-spacing:0.2em;text-transform:uppercase;white-space:nowrap;opacity:0.9;">${label}</span>
            <div style="flex:1;height:1px;background:${color};opacity:0.22;"></div>
          </div>
          ${subtitle ? `<p style="margin:0 0 14px;font-size:0.75rem;color:var(--muted);opacity:0.6;">${subtitle}</p>` : ''}`;
      }

      return `
        <style>
          @keyframes ahFadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
          }
        </style>
        <div class="panel-card" style="margin-top:24px;padding:28px 32px;">
          <div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:4px;">
            <h3 style="margin:0;font-size:1.05rem;font-weight:700;">🏥 Agent Health Dashboard</h3>
            <span style="font-size:0.68rem;font-family:'DM Mono',monospace;color:var(--muted);opacity:0.6;white-space:nowrap;">${lastRefreshTime ? 'Last updated: ' + lastRefreshTime + ' · Auto-refreshes every 30s' : 'Auto-refreshes every 30s'}</span>
          </div>
          <p style="margin:0 0 18px;font-size:0.81rem;color:var(--muted);">Real-time performance of your AI support pipeline</p>

          <div style="background:${bannerBg};border:1px solid ${bannerBorderColor};border-radius:11px;padding:14px 18px;margin-bottom:4px;display:flex;align-items:center;gap:12px;">
            <span style="font-size:1.3rem;flex-shrink:0;">${bannerIcon}</span>
            <span style="font-size:0.95rem;font-weight:600;color:${bannerBorderColor};">${bannerText}</span>
          </div>

          ${rowHeader(CYAN, 'Quality Metrics', 'How well agents understand and respond')}
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:stretch;">
            ${card(CYAN, classStatus, '🎯', 'Classification Accuracy', classAcc + '%',
              'Accuracy in categorizing customer issues', 'Target: &gt;80%', classPill, 0)}
            ${card(CYAN, timeStatus, '⚡', 'Avg Response Time',
              avgTime !== null ? avgTime.toFixed(1) + 's' : '--',
              'End-to-end response time per ticket', 'Target: &lt;15s', timePill, 60)}
            ${card(CYAN, confStatus, '🧠', 'Model Confidence', avgConf + '%',
              'AI certainty in generated responses', 'Auto-escalates when below 55%', confPill, 120)}
          </div>

          ${rowHeader(VIOLET, 'Operational Metrics', 'Business efficiency of the support pipeline')}
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:stretch;">
            ${card(VIOLET, 'green', '💰', 'Cost per Ticket', '~$' + avgCostUsd.toFixed(6),
              'AI processing cost per ticket',
              `${costLabel} · vs ~$8.50 human`, '🟢 Cost Efficient', 180)}
            ${card(VIOLET, escalStatus, '🤝', 'Escalation Rate', escalPct + '%',
              'Tickets requiring human intervention',
              `${escalatedCount} of ${total} ticket${total !== 1 ? 's' : ''} escalated`, escalPill, 240)}
            ${card(VIOLET, resStatus, '✅', 'Resolution Rate', resPct + '%',
              'Tickets resolved without human help',
              `${resolvedCount} of ${total} ticket${total !== 1 ? 's' : ''} auto-resolved`, resPill, 300)}
          </div>

          ${rowHeader(EMERALD, 'Pipeline Metrics', 'Technical health of the agent pipeline')}
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:stretch;">
            ${card(EMERALD, kbStatus, '📚', 'Knowledge Base Coverage', kbPct + '%',
              'Tickets matched to knowledge base articles',
              `${withArticles} ticket${withArticles !== 1 ? 's' : ''} had relevant articles`, kbPill, 360)}
            ${card(EMERALD, fallbackStatus, '🔄', 'Fallback Rate', fallbackPct + '%',
              'Tickets processed without LLM (rule-based fallback)',
              `${detCount} deterministic · ${llmCount} LLM-powered`, fallbackPill, 420)}
            ${card(EMERALD, 'green', '⚡', 'Throughput', tickets24h + ' / day',
              'Tickets processed in the last 24 hours',
              `Avg ${avgPerHour} / hour · Total: ${total} ticket${total !== 1 ? 's' : ''}`, '🟢 Operational', 480)}
          </div>

          <div style="margin-top:20px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <span style="font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.12em;margin-right:4px;">AI Execution Mode</span>
            <span style="font-size:0.78rem;color:var(--muted);font-family:'DM Mono',monospace;">🤖 Claude AI (${llmCount} ticket${llmCount !== 1 ? 's' : ''})</span>
            <span style="font-size:0.72rem;color:var(--muted);opacity:0.45;margin:0 2px;">·</span>
            <span style="font-size:0.78rem;color:var(--muted);font-family:'DM Mono',monospace;">⚙️ Rule-based (${detCount} ticket${detCount !== 1 ? 's' : ''})</span>
          </div>
        </div>
      `;
    }

    function renderAnalyticsCategoryChart(tickets) {
      const CATS = [
        { key: 'Order Issues',    emoji: '📦', color: '#38BDF8' },
        { key: 'Billing',         emoji: '💳', color: '#A78BFA' },
        { key: 'Account Access',  emoji: '🔐', color: '#6EE7B7' },
        { key: 'Technical Issue', emoji: '⚙️', color: '#FBBF24' },
        { key: 'General Support', emoji: '💬', color: '#F87171' },
      ];
      const counts = {};
      CATS.forEach(c => { counts[c.key] = 0; });
      tickets.forEach(t => {
        if (counts[t.category] !== undefined) counts[t.category]++;
        else counts['General Support']++;
      });
      const maxCount = Math.max(...Object.values(counts), 1);
      const barH = 30, gap = 16, labelW = 170, chartW = 380;
      const totalH = CATS.length * (barH + gap) - gap;
      const rows = CATS.map((c, i) => {
        const count = counts[c.key];
        const bw = (count / maxCount) * chartW;
        const y = i * (barH + gap);
        return `
          <text x="0" y="${y + barH / 2 + 5}" fill="var(--muted)" font-size="13" font-family="Sora,sans-serif">${c.emoji} ${c.key}</text>
          <rect x="${labelW}" y="${y}" width="${Math.max(bw, 2)}" height="${barH}" rx="6" fill="${c.color}" opacity="0.82"/>
          <text x="${labelW + Math.max(bw, 2) + 8}" y="${y + barH / 2 + 5}" fill="var(--text)" font-size="13" font-family="DM Mono,monospace">${count}</text>
        `;
      }).join('');
      return `
        <div class="panel-card" style="margin-top: 20px; padding: 28px 32px;">
          <h3 style="margin: 0 0 24px; font-size: 0.88rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em;">Tickets by Category</h3>
          <svg width="100%" viewBox="0 0 ${labelW + chartW + 60} ${totalH}" style="overflow: visible;">${rows}</svg>
        </div>
      `;
    }

    function renderAnalyticsSentimentChart(tickets) {
      const SENTIMENTS = [
        { key: 'Neutral',   color: '#6EE7B7' },
        { key: 'Concerned', color: '#F87171' },
        { key: 'Urgent',    color: '#FBBF24' },
      ];
      const counts = {};
      SENTIMENTS.forEach(s => { counts[s.key] = 0; });
      tickets.forEach(t => {
        if (counts[t.sentiment] !== undefined) counts[t.sentiment]++;
        else counts['Neutral']++;
      });
      const total = tickets.length;
      const cx = 90, cy = 90, r = 64, sw = 26;
      const circ = 2 * Math.PI * r;
      let cumAngle = -90;
      const segments = SENTIMENTS.map(s => {
        const pct = total > 0 ? counts[s.key] / total : 0;
        const dash = pct * circ;
        const seg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${sw}"
          stroke-dasharray="${dash} ${circ - dash}"
          transform="rotate(${cumAngle} ${cx} ${cy})" opacity="0.88"/>`;
        cumAngle += pct * 360;
        return seg;
      }).join('');
      const legend = SENTIMENTS.map(s => {
        const pct = total > 0 ? ((counts[s.key] / total) * 100).toFixed(0) : '0';
        return `
          <div style="display:flex; align-items:center; gap:8px; font-size:0.85rem;">
            <span style="width:10px; height:10px; border-radius:50%; background:${s.color}; flex-shrink:0; display:inline-block;"></span>
            <span style="color:var(--muted); flex:1;">${s.key}</span>
            <span style="color:var(--text); font-family:'DM Mono',monospace;">${pct}%</span>
          </div>`;
      }).join('');
      return `
        <div class="panel-card" style="padding: 28px 32px;">
          <h3 style="margin: 0 0 24px; font-size: 0.88rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em;">Sentiment Distribution</h3>
          <div style="display:flex; gap:24px; align-items:center;">
            <svg width="180" height="180" viewBox="0 0 180 180" style="flex-shrink:0;">
              ${segments}
              <text x="${cx}" y="${cy - 4}" text-anchor="middle" dominant-baseline="middle" fill="var(--text)" font-size="24" font-family="DM Mono,monospace" font-weight="500">${total}</text>
              <text x="${cx}" y="${cy + 16}" text-anchor="middle" fill="var(--muted)" font-size="11" font-family="Sora,sans-serif">tickets</text>
            </svg>
            <div style="display:grid; gap:14px; flex:1;">${legend}</div>
          </div>
        </div>
      `;
    }

    function renderAnalyticsUrgencyPills(tickets) {
      const URGENCY = [
        { key: 'Low',    emoji: '🟢', color: '#6EE7B7' },
        { key: 'Medium', emoji: '🟡', color: '#FBBF24' },
        { key: 'High',   emoji: '🔴', color: '#F87171' },
      ];
      const counts = { Low: 0, Medium: 0, High: 0 };
      tickets.forEach(t => { if (counts[t.urgency] !== undefined) counts[t.urgency]++; });
      const total = tickets.length;
      const pills = URGENCY.map(u => {
        const pct = total > 0 ? ((counts[u.key] / total) * 100).toFixed(0) : '0';
        return `
          <div style="background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:22px 16px; text-align:center;">
            <div style="font-size:1.6rem; margin-bottom:8px;">${u.emoji}</div>
            <div style="font-size:2rem; font-family:'DM Mono',monospace; color:${u.color}; margin-bottom:6px;">${counts[u.key]}</div>
            <div style="font-size:0.82rem; color:var(--muted);">${u.key} · ${pct}%</div>
          </div>`;
      }).join('');
      return `
        <div class="panel-card" style="padding: 28px 32px;">
          <h3 style="margin: 0 0 24px; font-size: 0.88rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em;">Urgency Distribution</h3>
          <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:14px;">${pills}</div>
        </div>
      `;
    }

    function renderAnalyticsTimeline(tickets) {
      const today = new Date();
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        days.push(d.toISOString().split('T')[0]);
      }
      const counts = {};
      days.forEach(d => { counts[d] = 0; });
      tickets.forEach(t => {
        if (t.created_at) {
          const day = t.created_at.split('T')[0];
          if (counts[day] !== undefined) counts[day]++;
        }
      });
      const values = days.map(d => counts[d]);
      const maxVal = Math.max(...values, 1);
      const W = 640, H = 110, px = 24, py = 14, cw = W - px * 2, ch = H - py * 2;
      const coords = days.map((d, i) => ({
        x: px + (i / (days.length - 1)) * cw,
        y: py + ch - (values[i] / maxVal) * ch,
        v: values[i],
        lbl: d.slice(5),
      }));
      const polyline = coords.map(c => `${c.x},${c.y}`).join(' ');
      const area = `${coords[0].x},${py + ch} ` + coords.map(c => `${c.x},${c.y}`).join(' ') + ` ${coords[coords.length - 1].x},${py + ch}`;
      const dots = coords.map(c => `
        <circle cx="${c.x}" cy="${c.y}" r="4.5" fill="var(--accent2)" stroke="var(--bg)" stroke-width="2"/>
        ${c.v > 0 ? `<text x="${c.x}" y="${c.y - 10}" text-anchor="middle" fill="var(--text)" font-size="11" font-family="DM Mono,monospace">${c.v}</text>` : ''}
      `).join('');
      const labels = coords.map(c => `<text x="${c.x}" y="${H + 18}" text-anchor="middle" fill="var(--muted)" font-size="11" font-family="DM Mono,monospace">${c.lbl}</text>`).join('');
      return `
        <div class="panel-card" style="margin-top: 20px; padding: 28px 32px;">
          <h3 style="margin: 0 0 24px; font-size: 0.88rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em;">Ticket Timeline · Last 7 Days</h3>
          <svg width="100%" viewBox="0 0 ${W} ${H + 28}" style="overflow: visible;">
            <defs>
              <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="var(--accent2)" stop-opacity="0.18"/>
                <stop offset="100%" stop-color="var(--accent2)" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <polygon points="${area}" fill="url(#sparkGrad)"/>
            <polyline points="${polyline}" fill="none" stroke="var(--accent2)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
            ${dots}
            ${labels}
          </svg>
        </div>
      `;
    }

    function renderAnalyticsExecutionMode(tickets) {
      const llm = tickets.filter(t => t.execution_mode === 'llm').length;
      const det = tickets.length - llm;
      return `
        <div class="panel-card" style="margin-top: 20px; padding: 28px 32px;">
          <h3 style="margin: 0 0 24px; font-size: 0.88rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em;">Execution Mode</h3>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
            <div style="text-align:center; padding:28px 16px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:14px;">
              <div style="font-size:2rem; margin-bottom:10px;">🤖</div>
              <div style="font-size:2.8rem; font-family:'DM Mono',monospace; color:var(--accent2); line-height:1;">${llm}</div>
              <div style="color:var(--muted); margin-top:10px; font-size:0.9rem;">LLM Mode</div>
            </div>
            <div style="text-align:center; padding:28px 16px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:14px;">
              <div style="font-size:2rem; margin-bottom:10px;">⚙️</div>
              <div style="font-size:2.8rem; font-family:'DM Mono',monospace; color:var(--accent3); line-height:1;">${det}</div>
              <div style="color:var(--muted); margin-top:10px; font-size:0.9rem;">Deterministic</div>
            </div>
          </div>
        </div>
      `;
    }

    // ─────────────────────────────────────────────

    async function loadMetrics() {
      if (!state.useBackend) return;
      try {
        const metricsUrl = state.backendUrl.replace('/api/support', '/api/metrics/summary');
        const resp = await fetch(metricsUrl, { headers: { 'X-API-Key': state.apiKey } });
        if (!resp.ok) return;
        const data = await resp.json();
        state.perfMetrics = data;
        state.csatMetrics = data;
        render();
      } catch (e) {}
    }

    async function loadHistoricalTickets() {
      if (!state.useBackend) return;
      try {
        const ticketsUrl = state.backendUrl.replace('/api/support', '/api/tickets');
        const resp = await fetch(ticketsUrl, { headers: { 'X-API-Key': state.apiKey } });
        if (!resp.ok) return;
        const dbTickets = await resp.json();
        const existingIds = new Set(state.tickets.map(t => t.reference_id));
        for (const t of dbTickets) {
          if (!existingIds.has(t.reference_id)) {
            t._source = 'db';
            t.timestamp = t.created_at ? new Date(t.created_at).toLocaleTimeString() : '—';
            state.tickets.push(t);
          }
        }
        render();
      } catch (e) {}
    }

    function syntaxHighlight(json) {
      const escaped = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return escaped.replace(/("(.*?)"")?(: )?/g, match => {
        if (/": $/.test(match)) return `<span class="json-key">${match}</span>`;
        return `<span class="json-string">${match}</span>`;
      }).replace(/\b(true|false|null)\b/g, '<span class="json-boolean">$1</span>').replace(/(\b\d+\.?\d*\b)/g, '<span class="json-number">$1</span>');
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toast.timeoutId);
      toast.timeoutId = setTimeout(() => {
        toast.classList.remove('show');
      }, 3200);
    }

    // ── Auto-refresh ─────────────────────────────────────────────────────────
    let analyticsRefreshInterval = null;
    let lastRefreshTime = null;

    function startAnalyticsRefresh() {
      if (analyticsRefreshInterval) return;
      analyticsRefreshInterval = setInterval(() => {
        if (!state.useBackend) return;
        const ticketsUrl = state.backendUrl.replace('/api/support', '/api/tickets');
        fetch(ticketsUrl, { headers: { 'X-API-Key': state.apiKey } })
          .then(r => r.ok ? r.json() : null)
          .then(data => {
            if (!data || !Array.isArray(data)) return;
            const existingIds = new Set(state.tickets.map(t => t.reference_id));
            const newTickets = data.filter(t => !existingIds.has(t.reference_id));
            if (newTickets.length > 0) {
              newTickets.forEach(t => {
                t._source = 'db';
                t.timestamp = t.created_at ? new Date(t.created_at).toLocaleTimeString() : '—';
              });
              state.tickets = [...state.tickets, ...newTickets];
            }
            lastRefreshTime = new Date().toLocaleTimeString();
            if (state.view === 'analytics') render();
          })
          .catch(() => {});
      }, 30000);
    }

    render();
    loadHistoricalTickets();
    loadMetrics();
    startAnalyticsRefresh();
  </script>
</body>
</html>
