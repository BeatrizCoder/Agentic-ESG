articles:

  # ── Order Issues ──────────────────────────────────────────────
  - id: ORD-001
    category: Order Issues
    title: Order Delivery Delays
    keywords:
      - order
      - tracking
      - shipment
      - delivery
      - package
      - arrived
      - delay
      - delayed
      - estimated delivery
      - where is my order
      - pedido
      - entrega
      - rastreio
      - rastreamento
      - atraso
      - atrasado
      - prazo de entrega
    content: >
      Orders may experience delays due to high demand, weather disruptions, or
      carrier issues. You can track your package using the link in your shipping
      confirmation email. Standard delivery typically takes 5–7 business days;
      express delivery takes 1–2 business days. If your estimated delivery date
      has passed, please allow one additional business day before contacting
      support.
    escalate_if: low confidence

  - id: ORD-002
    category: Order Issues
    title: Missing or Lost Package
    keywords:
      - missing order
      - lost package
      - never arrived
      - never received
      - not delivered
      - package lost
      - where is my order
      - lost
      - nao recebi
      - não recebi
      - nunca chegou
      - sumiu
      - extraviado
      - perdido
      - cadê meu pedido
    content: >
      If your tracking status shows "delivered" but you have not received your
      package, first check with neighbours and your building's reception area.
      If the package is still missing after 24 hours, a support agent will open
      a carrier investigation and arrange a replacement or full refund within
      3–5 business days.
    escalate_if: always escalate

  - id: ORD-003
    category: Order Issues
    title: Wrong or Incorrect Order Received
    keywords:
      - wrong order
      - incorrect order
      - wrong item
      - different item
      - not what i ordered
      - pedido errado
      - item errado
      - produto errado
      - veio errado
      - recebi errado
    content: >
      If you received an item different from what you ordered, do not discard
      the incorrect item. A human agent will arrange a free return label and
      ship the correct item at no additional cost. Replacement orders are
      prioritised and typically dispatched within 1 business day.
    escalate_if: always escalate

  # ── Billing ───────────────────────────────────────────────────
  - id: BIL-001
    category: Billing
    title: Refunds and Billing Questions
    keywords:
      - refund
      - reimbursement
      - money back
      - billing
      - invoice
      - payment
      - charge
      - receipt
      - reembolso
      - reemb
      - dinheiro de volta
      - cobrança
      - fatura
      - pagamento
      - quero meu dinheiro
    content: >
      Refunds are processed to the original payment method within 5–10 business
      days once approved. To request a refund, a human agent must verify the
      order details and confirm eligibility. Approved refunds for defective or
      missing items are typically processed in full. For billing questions about
      your invoice, an agent can provide a detailed breakdown of all charges.
    escalate_if: always escalate

  - id: BIL-002
    category: Billing
    title: Unauthorized or Incorrect Charges
    keywords:
      - unauthorized charge
      - wrong charge
      - overcharged
      - duplicate charge
      - dispute
      - chargeback
      - charge back
      - fraud
      - cobrança indevida
      - cobrança errada
      - cobrado errado
      - cobrança duplicada
      - me cobraram
      - pagamento errado
      - não autorizei
      - nao autorizei
      - estorno
      - fraude
    content: >
      If you see a charge you do not recognise, a human agent will investigate
      immediately. We will cross-reference the charge with your order history
      and, if confirmed as an error, issue a full refund within 3–5 business
      days. In cases of suspected fraud, your account will be secured and the
      charge disputed with your bank on your behalf.
    escalate_if: always escalate

  # ── Account Access ────────────────────────────────────────────
  - id: ACC-001
    category: Account Access
    title: Resetting Your Password
    keywords:
      - password
      - reset password
      - forgot password
      - login
      - sign in
      - locked
      - locked out
      - cannot login
      - access
      - senha
      - redefinir senha
      - esqueci a senha
      - entrar
      - bloqueado
      - acesso
      - nao consigo entrar
      - não consigo entrar
    content: >
      To reset your password, click "Forgot Password" on the sign-in page and
      enter your registered email. You will receive a reset link within a few
      minutes — check your spam folder if it does not arrive. The link expires
      after 30 minutes. If your account is locked after multiple failed attempts,
      it will automatically unlock after 15 minutes.
    escalate_if: low confidence

  - id: ACC-002
    category: Account Access
    title: Account Hacked or Unauthorized Access
    keywords:
      - account hacked
      - hacked
      - unauthorized access
      - data breach
      - suspicious login
      - someone else
      - security breach
      - compromised
      - conta hackeada
      - acesso nao autorizado
      - acesso não autorizado
      - invasão
      - segurança
      - alguem acessou
      - alguém acessou
    content: >
      If you believe your account has been compromised, a human agent will lock
      the account immediately, review recent login activity, and guide you
      through the full account recovery process. You will be asked to verify
      your identity before regaining access. We may also notify you of any
      suspicious changes made while the account was compromised.
    escalate_if: always escalate

  # ── Technical Issue ───────────────────────────────────────────
  - id: TEC-001
    category: Technical Issue
    title: Troubleshooting Login Errors
    keywords:
      - error
      - login error
      - cannot login
      - sign in error
      - bug
      - crash
      - failed
      - not working
      - erro
      - erro de login
      - bug
      - falhou
      - travou
      - nao funciona
      - não funciona
    content: >
      Most login errors can be resolved by clearing your browser cache and
      cookies, then trying again in a private or incognito window. Make sure
      you are using the email address associated with your account. If the
      problem persists after resetting your password, try a different browser
      or device. Our platform supports the latest two versions of Chrome,
      Firefox, Safari, and Edge.
    escalate_if: low confidence

  - id: TEC-002
    category: Technical Issue
    title: Site or App Performance Problems
    keywords:
      - site
      - website
      - app
      - slow
      - performance
      - not loading
      - loading
      - down
      - unavailable
      - page not found
      - site lento
      - lento
      - nao carrega
      - não carrega
      - fora do ar
      - indisponível
      - pagina nao abre
    content: >
      If the site or app is loading slowly or not at all, start by clearing
      your browser cache and disabling browser extensions. Check your internet
      connection speed. If you are on a mobile device, try switching between
      Wi-Fi and mobile data. Our engineering team monitors uptime continuously;
      if there is a known outage, a banner will be displayed on the homepage.
    escalate_if: low confidence

  # ── General Support ───────────────────────────────────────────
  - id: GEN-001
    category: General Support
    title: Contacting Customer Service
    keywords:
      - contact
      - customer service
      - support
      - help
      - speak with
      - talk to
      - human
      - agent
      - representative
      - atendimento
      - suporte
      - ajuda
      - contato
      - falar com
      - atendente
    content: >
      Our customer service team is available Monday–Friday, 9 AM–6 PM (local
      time). You can reach us by chat, email, or phone. Average response time
      is under 4 hours for email and under 2 minutes for chat. For urgent
      issues outside business hours, use the 24/7 chat and a bot will collect
      your details for priority callback the next business day.
    escalate_if: low confidence

  - id: GEN-002
    category: General Support
    title: Product Information and FAQs
    keywords:
      - information
      - faq
      - question
      - product
      - how to
      - how do i
      - what is
      - explain
      - informação
      - pergunta
      - produto
      - como
      - como faço
      - o que é
      - duvida
      - dúvida
    content: >
      Our Help Centre contains step-by-step guides, video tutorials, and
      frequently asked questions covering every feature of our platform. Use
      the search bar on the Help Centre homepage to find answers quickly. If
      you cannot find what you are looking for, our virtual assistant can
      answer most common questions instantly, or connect you with a support
      agent for more complex enquiries.
    escalate_if: never
